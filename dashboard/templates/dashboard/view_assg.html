{% extends 'dashboard/dashboard.html' %}

{% block content %}
<h2>Assignments</h2>
<ul>
    {% for assignment in assignments %}
    <li>
        <strong>{{ assignment.title }}</strong> - Due: {{ assignment.due_date }}
        <a href="{{ assignment.file.url }}" download>Download</a>
    </li>
    {% endfor %}
</ul>
{% endblock %}
