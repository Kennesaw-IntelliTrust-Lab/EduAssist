<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAssist - Register</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
        }
        .container {
            display: flex;
            width: 800px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .left-section {
            width: 40%;
            background-color: #2563eb;
            color: white;
            padding: 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .right-section {
            width: 60%;
            padding: 40px;
        }
        h1 {
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }
        label {
            font-weight: bold;
            color: #555;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .btn {
            width: 100%;
            padding: 10px;
            background-color: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #1d4fd9;
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
        .success {
            color: green;
            text-align: center;
            margin-top: 10px;
        }
        .login-link {
            text-align: center;
            margin-top: 10px;
        }
        .login-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        /* SVG Logo Styling */
        svg {
            width: 120px;
            height: auto;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Left Section: EduAssist Branding -->
    <div class="left-section">
        <!-- EduAssist Logo (SVG) -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 50">
            <path d="M40 10 L40 40 L60 35 L80 40 L80 10 L60 15 L40 10" fill="#ffffff" />
            <path d="M40 10 L60 15 L80 10" fill="none" stroke="#ffffff" stroke-width="2" />
            <path d="M65 20 L67 16 L71 18 L73 16 L71 12 L75 11 L75 8 L71 7 L73 3 L71 1 L67 3 L65 0 L63 0 L61 3 L57 1 L55 3 L57 7 L53 8 L53 11 L57 12 L55 16 L57 18 L61 16 L63 20 Z" 
                transform="translate(10, 15) scale(0.8)" 
                fill="#2563eb"/>
            <text x="90" y="32" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">EduAssist</text>
        </svg>
        <!--
        <h2>EduAssist</h2>
        <p>An intelligent teacher dashboard designed to streamline the educational workflow.</p>
        -->
    </div>

    <!-- Right Section: Registration Form -->
    <div class="right-section">
        <h1>Register</h1>
        <form id="registerForm" method="POST" action="/dashboard/register/">
            {% csrf_token %}
            <label for="username">Username:</label>
            <input type="text" name="username" required>

            <label for="email">Email:</label>
            <input type="email" name="email" required>

            <label for="password">Password:</label>
            <input type="password" name="password" required>

            <label for="confirm_password">Confirm Password:</label>
            <input type="password" name="confirm_password" required>

            <button type="submit" class="btn">Register</button>

            {% if error %}
                <p class="error">{{ error }}</p>
            {% endif %}
            {% if messages %}
                {% for message in messages %}
                    <p class="success">{{ message }}</p>
                {% endfor %}
            {% endif %}
        </form>

        <!-- Already a user? Login link -->
        <div class="login-link">
            <p>Already a user? <a href="/dashboard/login/">Login</a></p>
        </div>
    </div>
</div>

<script>
    document.getElementById("registerForm").addEventListener("submit", function(event) {
        var password = document.getElementsByName("password")[0].value;
        var confirmPassword = document.getElementsByName("confirm_password")[0].value;

        if (password !== confirmPassword) {
            event.preventDefault();
            alert("Passwords do not match!");
        }
    });
</script>

</body>
</html>
